version: "3.8"

services:
  app:
    build: .
    container_name: medicalstore_app
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=medicalstore
      - SESSION_SECRET=super-secret-session-key-change-in-prod
      - GIN_MODE=release
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medicalstore_net

  mongo:
    image: mongo:7.0
    container_name: medicalstore_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medicalstore_net

  mongo-express:
    image: mongo-express:latest
    container_name: medicalstore_mongoexpress
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - medicalstore_net

volumes:
  mongo_data:

networks:
  medicalstore_net:
    driver: bridge
