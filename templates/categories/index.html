{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-5" x-data="{ showForm: false }">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Categories</h1>
      <p class="text-gray-500 text-sm">Manage medicine categories</p>
    </div>
    <button @click="showForm = !showForm"
      class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">
      <i class="fas fa-plus"></i> Add Category
    </button>
  </div>

  <!-- Add Form (HTMX posts, targets the table partial) -->
  <div x-show="showForm" x-cloak class="bg-white rounded-xl shadow-sm p-5">
    <h2 class="font-semibold text-gray-700 mb-4">New Category</h2>
    <form
      hx-post="/categories"
      hx-target="#categories-table"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset(); $store.ui && ($store.ui.showForm = false)"
      class="flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-gray-500 mb-1">Name <span class="text-red-500">*</span></label>
        <input type="text" name="name" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Category name" />
      </div>
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-gray-500 mb-1">Description</label>
        <input type="text" name="description"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Optional description" />
      </div>
      <div class="flex gap-2">
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
          <i class="fas fa-save mr-1"></i> Save
        </button>
        <button type="button" @click="showForm = false"
          class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition">
          Cancel
        </button>
      </div>
    </form>
  </div>

  <!-- Table (replaced by HTMX on changes) -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <div id="categories-table">
      {{template "categories/table.html" .}}
    </div>
  </div>
</div>
{{end}}
