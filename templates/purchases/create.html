{{template "layout.html" .}}

{{define "content"}}
<div class="max-w-3xl mx-auto space-y-5" x-data="purchaseApp()">
  <div class="flex items-center gap-3">
    <a href="/purchases" class="text-gray-500 hover:text-gray-700 p-1.5 rounded hover:bg-gray-100">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-bold text-gray-800">New Purchase Order</h1>
  </div>

  <form method="POST" action="/purchases" class="space-y-5">
    <!-- Supplier -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <h2 class="font-semibold text-gray-700 mb-4"><i class="fas fa-truck mr-2 text-purple-500"></i>Supplier</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Select Supplier <span class="text-red-500">*</span></label>
          <select name="supplier_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Choose Supplier --</option>
            {{range .suppliers}}
            <option value="{{.ID.Hex}}">{{.Name}} ({{.City}})</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <input type="text" name="notes" placeholder="Optional order notes..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
    </div>

    <!-- Items -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-gray-700"><i class="fas fa-pills mr-2 text-blue-500"></i>Order Items</h2>
        <button type="button" @click="addRow()"
          class="inline-flex items-center gap-1.5 text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-medium transition">
          <i class="fas fa-plus"></i> Add Item
        </button>
      </div>

      <div class="space-y-3">
        <template x-for="(row, index) in rows" :key="index">
          <div class="grid grid-cols-12 gap-2 items-end p-3 bg-gray-50 rounded-lg">
            <div class="col-span-12 sm:col-span-4">
              <label class="block text-xs text-gray-500 mb-1">Medicine</label>
              <select :name="'medicine_id[]'" required class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select Medicine</option>
                {{range .medicines}}
                <option value="{{.ID.Hex}}">{{.Name}}</option>
                {{end}}
              </select>
            </div>
            <div class="col-span-4 sm:col-span-2">
              <label class="block text-xs text-gray-500 mb-1">Qty</label>
              <input type="number" :name="'quantity[]'" x-model.number="row.qty" @input="calcRowTotal(index)"
                min="1" required class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="col-span-4 sm:col-span-2">
              <label class="block text-xs text-gray-500 mb-1">Unit Price (&#8377;)</label>
              <input type="number" :name="'unit_price[]'" x-model.number="row.price" @input="calcRowTotal(index)"
                step="0.01" min="0" required class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="col-span-4 sm:col-span-2">
              <label class="block text-xs text-gray-500 mb-1">Batch No</label>
              <input type="text" :name="'batch_number[]'" placeholder="BT001"
                class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="col-span-8 sm:col-span-1">
              <label class="block text-xs text-gray-500 mb-1">Expiry</label>
              <input type="date" :name="'expiry_date[]'"
                class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="col-span-4 sm:col-span-1 flex items-end pb-0.5">
              <button type="button" @click="removeRow(index)" x-show="rows.length > 1"
                class="w-full py-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-lg text-sm transition">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        </template>
      </div>

      <div class="mt-4 pt-4 border-t flex justify-between items-center">
        <span class="text-sm text-gray-500">Total Items: <strong x-text="rows.length"></strong></span>
        <div class="text-right">
          <p class="text-sm text-gray-500">Estimated Total</p>
          <p class="text-xl font-bold text-purple-600">&#8377;<span x-text="grandTotal.toFixed(2)"></span></p>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <a href="/purchases" class="px-5 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition">Cancel</a>
      <button type="submit" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium transition">
        <i class="fas fa-file-invoice mr-1"></i> Create Purchase Order
      </button>
    </div>
  </form>
</div>

<script>
function purchaseApp() {
  return {
    rows: [{ qty: 1, price: 0, total: 0 }],
    grandTotal: 0,
    addRow() { this.rows.push({ qty: 1, price: 0, total: 0 }); },
    removeRow(i) { this.rows.splice(i, 1); this.updateGrandTotal(); },
    calcRowTotal(i) {
      this.rows[i].total = this.rows[i].qty * this.rows[i].price;
      this.updateGrandTotal();
    },
    updateGrandTotal() {
      this.grandTotal = this.rows.reduce((s, r) => s + r.total, 0);
    }
  }
}
</script>
{{end}}
