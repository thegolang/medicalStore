{{template "layout.html" .}}

{{define "content"}}
<div class="max-w-3xl mx-auto space-y-5">
  <div class="flex items-center gap-3">
    <a href="/medicines" class="text-gray-500 hover:text-gray-700 p-1.5 rounded hover:bg-gray-100">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-bold text-gray-800">{{.title}}</h1>
  </div>

  {{if .error}}
  <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2">
    <i class="fas fa-exclamation-circle"></i> {{.error}}
  </div>
  {{end}}

  <form method="POST" action="{{if .isNew}}/medicines{{else}}/medicines/{{.medicine.ID.Hex}}{{end}}"
    class="bg-white rounded-xl shadow-sm p-6 space-y-6">
    {{if not .isNew}}
    <input type="hidden" name="_method" value="PUT" />
    {{end}}

    <div>
      <h2 class="text-base font-semibold text-gray-700 border-b pb-2 mb-4">Basic Information</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Medicine Name <span class="text-red-500">*</span></label>
          <input type="text" name="name" required value="{{.medicine.Name}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="e.g. Paracetamol 500mg" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Generic Name</label>
          <input type="text" name="generic_name" value="{{.medicine.GenericName}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="e.g. Acetaminophen" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-red-500">*</span></label>
          <select name="category_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Select Category</option>
            {{range .categories}}
            <option value="{{.ID.Hex}}" {{if eq $.medicine.CategoryID .ID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Supplier <span class="text-red-500">*</span></label>
          <select name="supplier_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Select Supplier</option>
            {{range .suppliers}}
            <option value="{{.ID.Hex}}" {{if eq $.medicine.SupplierID .ID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Manufacturer</label>
          <input type="text" name="manufacturer" value="{{.medicine.Manufacturer}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="e.g. Sun Pharma" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
          <select name="unit" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="tablet" {{if eq .medicine.Unit "tablet"}}selected{{end}}>Tablet</option>
            <option value="capsule" {{if eq .medicine.Unit "capsule"}}selected{{end}}>Capsule</option>
            <option value="ml" {{if eq .medicine.Unit "ml"}}selected{{end}}>ml (Liquid)</option>
            <option value="mg" {{if eq .medicine.Unit "mg"}}selected{{end}}>mg</option>
            <option value="strip" {{if eq .medicine.Unit "strip"}}selected{{end}}>Strip</option>
            <option value="bottle" {{if eq .medicine.Unit "bottle"}}selected{{end}}>Bottle</option>
            <option value="tube" {{if eq .medicine.Unit "tube"}}selected{{end}}>Tube</option>
            <option value="injection" {{if eq .medicine.Unit "injection"}}selected{{end}}>Injection</option>
            <option value="sachet" {{if eq .medicine.Unit "sachet"}}selected{{end}}>Sachet</option>
            <option value="unit" {{if eq .medicine.Unit "unit"}}selected{{end}}>Unit</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-base font-semibold text-gray-700 border-b pb-2 mb-4">Stock & Pricing</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
          <input type="number" name="quantity" required min="0" value="{{if .isNew}}0{{else}}{{.medicine.Quantity}}{{end}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Min Stock Level</label>
          <input type="number" name="min_stock_level" min="0" value="{{if .isNew}}10{{else}}{{.medicine.MinStockLevel}}{{end}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Purchase Price (&#8377;) <span class="text-red-500">*</span></label>
          <input type="number" name="purchase_price" required step="0.01" min="0" value="{{printf "%.2f" .medicine.PurchasePrice}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Selling Price (&#8377;) <span class="text-red-500">*</span></label>
          <input type="number" name="selling_price" required step="0.01" min="0" value="{{printf "%.2f" .medicine.SellingPrice}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Batch Number</label>
          <input type="text" name="batch_number" value="{{.medicine.BatchNumber}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="e.g. BT2024001" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date <span class="text-red-500">*</span></label>
          <input type="date" name="expiry_date" required
            value="{{if not .medicine.ExpiryDate.IsZero}}{{.medicine.ExpiryDate.Format "2006-01-02"}}{{end}}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-base font-semibold text-gray-700 border-b pb-2 mb-4">Additional Info</h2>
      <div class="grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Medicine description, usage, side effects...">{{.medicine.Description}}</textarea>
        </div>
        <div class="flex items-center gap-3">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="hidden" name="prescription" value="false" />
            <input type="checkbox" name="prescription" value="true" {{if .medicine.Prescription}}checked{{end}}
              class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
            <span class="text-sm font-medium text-gray-700">Requires Prescription (Rx)</span>
          </label>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <a href="/medicines" class="px-5 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
        Cancel
      </a>
      <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">
        <i class="fas fa-save mr-1"></i>
        {{if .isNew}}Add Medicine{{else}}Update Medicine{{end}}
      </button>
    </div>
  </form>
</div>
{{end}}
