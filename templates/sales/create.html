{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-5" x-data="salesApp()">
  <div class="flex items-center gap-3">
    <a href="/sales" class="text-gray-500 hover:text-gray-700 p-1.5 rounded hover:bg-gray-100">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-bold text-gray-800">New Sale / Billing</h1>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
    <!-- Left: Medicine Search & Cart -->
    <div class="lg:col-span-2 space-y-4">
      <!-- Search Medicine -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h2 class="font-semibold text-gray-700 mb-3"><i class="fas fa-search mr-2 text-blue-500"></i>Search Medicine</h2>
        <div class="relative">
          <i class="fas fa-pills absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" x-model="searchQuery" @input.debounce.300ms="searchMedicines()"
            @keydown.escape="searchResults = []"
            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Type medicine name to search..." />
        </div>
        <!-- Results Dropdown -->
        <div x-show="searchResults.length > 0" x-cloak class="mt-2 border border-gray-200 rounded-lg overflow-hidden shadow-sm">
          <template x-for="med in searchResults" :key="med.id">
            <div @click="addToCart(med)" class="flex items-center justify-between px-4 py-3 hover:bg-blue-50 cursor-pointer border-b last:border-0 transition">
              <div>
                <p class="font-medium text-gray-800" x-text="med.name"></p>
                <p class="text-xs text-gray-500" x-text="med.generic_name + ' • ' + med.category_name"></p>
              </div>
              <div class="text-right">
                <p class="font-semibold text-green-600">&#8377;<span x-text="med.selling_price.toFixed(2)"></span></p>
                <p class="text-xs" :class="med.quantity <= med.min_stock_level ? 'text-red-500' : 'text-gray-400'" x-text="'Stock: ' + med.quantity + ' ' + med.unit"></p>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Cart -->
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b flex items-center justify-between">
          <h2 class="font-semibold text-gray-700"><i class="fas fa-shopping-cart mr-2 text-green-500"></i>Cart Items</h2>
          <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-full" x-text="cart.length + ' items'"></span>
        </div>
        <div x-show="cart.length === 0" class="px-5 py-10 text-center text-gray-400">
          <i class="fas fa-shopping-basket text-3xl mb-2"></i>
          <p>No items added yet. Search and add medicines above.</p>
        </div>
        <div x-show="cart.length > 0">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Medicine</th>
                <th class="px-4 py-2 text-center text-xs font-semibold text-gray-500">Qty</th>
                <th class="px-4 py-2 text-right text-xs font-semibold text-gray-500">Price</th>
                <th class="px-4 py-2 text-right text-xs font-semibold text-gray-500">Total</th>
                <th class="px-4 py-2"></th>
              </tr>
            </thead>
            <tbody class="divide-y">
              <template x-for="(item, index) in cart" :key="item.medicine_id">
                <tr>
                  <td class="px-4 py-3">
                    <p class="font-medium text-gray-800" x-text="item.name"></p>
                    <p class="text-xs text-gray-400" x-text="item.unit"></p>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex items-center justify-center gap-1">
                      <button @click="decreaseQty(index)" class="w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 font-bold transition">-</button>
                      <input type="number" x-model.number="item.qty" @change="updateTotal()"
                        min="1" :max="item.stock"
                        class="w-14 text-center border border-gray-300 rounded px-1 py-0.5 text-sm" />
                      <button @click="increaseQty(index)" class="w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 font-bold transition">+</button>
                    </div>
                  </td>
                  <td class="px-4 py-3 text-right text-gray-600">&#8377;<span x-text="item.price.toFixed(2)"></span></td>
                  <td class="px-4 py-3 text-right font-semibold text-gray-800">&#8377;<span x-text="(item.qty * item.price).toFixed(2)"></span></td>
                  <td class="px-4 py-3 text-right">
                    <button @click="removeFromCart(index)" class="text-red-500 hover:text-red-700 p-1 rounded hover:bg-red-50">
                      <i class="fas fa-times"></i>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Right: Bill Summary -->
    <div class="space-y-4">
      <!-- Customer Info -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h2 class="font-semibold text-gray-700 mb-3"><i class="fas fa-user mr-2 text-purple-500"></i>Customer</h2>
        <div class="space-y-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Name</label>
            <input type="text" x-model="customerName" placeholder="Walk-in Customer"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Phone</label>
            <input type="tel" x-model="customerPhone" placeholder="+91 ..."
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>
      </div>

      <!-- Bill Summary -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h2 class="font-semibold text-gray-700 mb-4"><i class="fas fa-receipt mr-2 text-green-500"></i>Bill Summary</h2>
        <div class="space-y-3">
          <div class="flex justify-between text-sm">
            <span class="text-gray-500">Sub Total</span>
            <span class="font-medium">&#8377;<span x-text="subTotal.toFixed(2)"></span></span>
          </div>
          <div class="flex items-center gap-2 text-sm">
            <span class="text-gray-500 flex-1">Discount (&#8377;)</span>
            <input type="number" x-model.number="discount" @input="updateTotal()" min="0" step="0.01"
              class="w-24 px-2 py-1 border border-gray-300 rounded text-sm text-right focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div class="flex items-center gap-2 text-sm">
            <span class="text-gray-500 flex-1">Tax (&#8377;)</span>
            <input type="number" x-model.number="tax" @input="updateTotal()" min="0" step="0.01"
              class="w-24 px-2 py-1 border border-gray-300 rounded text-sm text-right focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div class="border-t pt-3 flex justify-between font-bold text-base">
            <span>Grand Total</span>
            <span class="text-green-600">&#8377;<span x-text="grandTotal.toFixed(2)"></span></span>
          </div>
        </div>

        <div class="mt-4 space-y-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Payment Method</label>
            <select x-model="paymentMethod" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="cash">Cash</option>
              <option value="card">Card</option>
              <option value="upi">UPI</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Amount Paid (&#8377;)</label>
            <input type="number" x-model.number="amountPaid" @input="calcChange()" step="0.01" min="0"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div class="flex justify-between text-sm font-medium">
            <span class="text-gray-500">Change</span>
            <span class="text-blue-600">&#8377;<span x-text="change.toFixed(2)"></span></span>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Notes</label>
            <textarea x-model="notes" rows="2" placeholder="Optional notes..."
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>

        <button @click="submitSale()" :disabled="cart.length === 0 || submitting"
          class="w-full mt-4 bg-green-600 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-cash-register"></i>
          <span x-text="submitting ? 'Processing...' : 'Complete Sale'"></span>
        </button>

        <div x-show="errorMsg" x-cloak class="mt-3 p-3 bg-red-50 text-red-700 rounded-lg text-sm" x-text="errorMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
function salesApp() {
  return {
    searchQuery: '',
    searchResults: [],
    cart: [],
    customerName: 'Walk-in Customer',
    customerPhone: '',
    discount: 0,
    tax: 0,
    subTotal: 0,
    grandTotal: 0,
    amountPaid: 0,
    change: 0,
    paymentMethod: 'cash',
    notes: '',
    submitting: false,
    errorMsg: '',

    async searchMedicines() {
      if (this.searchQuery.length < 2) { this.searchResults = []; return; }
      const res = await fetch('/medicines/search?q=' + encodeURIComponent(this.searchQuery));
      this.searchResults = await res.json();
    },

    addToCart(med) {
      const existing = this.cart.find(i => i.medicine_id === med.id);
      if (existing) {
        existing.qty = Math.min(existing.qty + 1, med.quantity);
      } else {
        this.cart.push({
          medicine_id: med.id,
          name: med.name,
          price: med.selling_price,
          qty: 1,
          stock: med.quantity,
          unit: med.unit
        });
      }
      this.searchQuery = '';
      this.searchResults = [];
      this.updateTotal();
    },

    removeFromCart(i) {
      this.cart.splice(i, 1);
      this.updateTotal();
    },

    increaseQty(i) {
      if (this.cart[i].qty < this.cart[i].stock) { this.cart[i].qty++; this.updateTotal(); }
    },

    decreaseQty(i) {
      if (this.cart[i].qty > 1) { this.cart[i].qty--; this.updateTotal(); }
    },

    updateTotal() {
      this.subTotal = this.cart.reduce((s, i) => s + i.qty * i.price, 0);
      this.grandTotal = Math.max(0, this.subTotal - this.discount + this.tax);
      this.amountPaid = this.grandTotal;
      this.calcChange();
    },

    calcChange() {
      this.change = Math.max(0, this.amountPaid - this.grandTotal);
    },

    async submitSale() {
      if (this.cart.length === 0) return;
      this.submitting = true;
      this.errorMsg = '';
      const items = this.cart.map(i => ({ medicine_id: i.medicine_id, name: i.name, qty: i.qty, price: i.price }));
      const form = new FormData();
      form.append('customer_name', this.customerName || 'Walk-in Customer');
      form.append('customer_phone', this.customerPhone);
      form.append('items', JSON.stringify(items));
      form.append('discount', this.discount);
      form.append('tax', this.tax);
      form.append('amount_paid', this.amountPaid);
      form.append('payment_method', this.paymentMethod);
      form.append('notes', this.notes);

      try {
        const res = await fetch('/sales', { method: 'POST', body: form });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/sales/' + data.invoice_id;
        } else {
          this.errorMsg = data.error || 'Failed to process sale';
        }
      } catch(e) {
        this.errorMsg = 'Network error. Please try again.';
      }
      this.submitting = false;
    }
  }
}
</script>
{{end}}
