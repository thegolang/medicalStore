{{template "layout.html" .}}

{{define "content"}}
<div class="max-w-xl mx-auto space-y-5">
  <h1 class="text-2xl font-bold text-gray-800">My Profile</h1>

  {{if .success}}
  <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center gap-2">
    <i class="fas fa-check-circle"></i> {{.success}}
  </div>
  {{end}}
  {{if .error}}
  <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2">
    <i class="fas fa-exclamation-circle"></i> {{.error}}
  </div>
  {{end}}

  <div class="bg-white rounded-xl shadow-sm p-6">
    <div class="flex items-center gap-4 mb-6 pb-6 border-b">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-2xl font-bold text-blue-700">
        {{if .user.FullName}}{{slice .user.FullName 0 1}}{{else}}A{{end}}
      </div>
      <div>
        <h2 class="text-xl font-bold text-gray-800">{{.user.FullName}}</h2>
        <p class="text-gray-500 text-sm">@{{.user.Username}}</p>
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium mt-1
          {{if eq .user.Role "admin"}}bg-red-100 text-red-800{{else if eq .user.Role "manager"}}bg-blue-100 text-blue-800{{else}}bg-gray-100 text-gray-700{{end}}">
          {{.user.Role}}
        </span>
      </div>
    </div>

    <form method="POST" action="/profile" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="full_name" value="{{.user.FullName}}"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" value="{{.user.Email}}"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div class="border-t pt-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password <span class="text-gray-400 text-xs">(leave blank to keep current)</span></label>
        <input type="password" name="new_password" minlength="6" placeholder="Min 6 characters"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div class="flex justify-end pt-2">
        <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">
          <i class="fas fa-save mr-1"></i> Update Profile
        </button>
      </div>
    </form>
  </div>
</div>
{{end}}
